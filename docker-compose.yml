services:
  textkit-api:
    build: .
    container_name: textkit-api
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - NODE_ENV=production
      - TEXTKIT_PORT=3100
      - DB_PATH=/app/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_BASIC=${STRIPE_PRICE_BASIC}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_ULTRA=${STRIPE_PRICE_ULTRA}
      - STRIPE_PRICE_MEGA=${STRIPE_PRICE_MEGA}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@textkitapi.com}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET}
      - LOCAL_API_KEY=${LOCAL_API_KEY}
